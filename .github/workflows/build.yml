name: Clean build

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Elm
        run: npm install -g elm@0.19.1

      - name: Setup GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10'
          cabal-version: 'latest'

      - name: Cache Cabal dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('statics/statics.cabal', 'cabal.project') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Install Elm app dependencies
        run: pnpm install
        working-directory: elm-app

      - name: Update Cabal package index
        run: cabal update

      - name: Run Elm tests
        run: make elm-test

      - name: Run Haskell tests
        run: make statics-test

      - name: Build
        run: make dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
