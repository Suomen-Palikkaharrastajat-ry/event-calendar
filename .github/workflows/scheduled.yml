name: Scheduled update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Four times per day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-scheduled
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Restore statics binary ────────────────────────────────────────────────

      - uses: actions/cache/restore@v4
        id: binary-cache
        with:
          path: statics/statics
          key: binary-statics-${{ runner.os }}-${{ hashFiles('statics/statics.cabal', 'cabal.project', 'statics/src/**/*.hs', 'statics/app/**/*.hs') }}

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        name: Setup GHC and Cabal (fallback build)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cabal/packages
          key: cabal-index-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: cabal-index-${{ runner.os }}-

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        run: cabal update

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('statics/statics.cabal', 'cabal.project') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        run: make statics-build

      - run: chmod +x statics/statics

      # ── Node / Elm caches ─────────────────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'elm-app/pnpm-lock.yaml'

      - name: Install Elm
        run: npm install -g elm@0.19.1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.elm
            elm-app/elm-stuff
          key: elm-${{ runner.os }}-${{ hashFiles('elm-app/elm.json') }}
          restore-keys: elm-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Install Elm app dependencies
        run: pnpm install
        working-directory: elm-app

      - name: Build
        run: make dist

      # ── Upload artifact ───────────────────────────────────────────────────────

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
