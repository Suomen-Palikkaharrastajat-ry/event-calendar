name: Scheduled update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Four times per day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-scheduled
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v16
        with:
          name: palikkaharrastajat
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ~/.cabal/packages
          key: cabal-index-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: cabal-index-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-store-${{ runner.os }}-${{ hashFiles('cabal.project.freeze', 'statics/statics.cabal') }}
          restore-keys: cabal-store-${{ runner.os }}-

      - name: Update Cabal package index
        run: devenv shell -- cabal update

      - name: Build
        run: devenv shell -- make dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
