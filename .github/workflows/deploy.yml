name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'elm-app/pnpm-lock.yaml'

      - name: Install Elm
        run: npm install -g elm@0.19.1

      - name: Setup GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      # ── Cabal package index cache (daily) ────────────────────────────────────

      - id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ~/.cabal/packages
          key: cabal-index-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: cabal-index-${{ runner.os }}-

      - run: cabal update

      # ── Cabal store cache ─────────────────────────────────────────────────────

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('statics/statics.cabal', 'cabal.project') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      # ── Elm cache ─────────────────────────────────────────────────────────────

      - uses: actions/cache@v4
        with:
          path: |
            ~/.elm
            elm-app/elm-stuff
          key: elm-${{ runner.os }}-${{ hashFiles('elm-app/elm.json') }}
          restore-keys: elm-${{ runner.os }}-

      # ── Install and test ──────────────────────────────────────────────────────

      - name: Install Elm app dependencies
        run: pnpm install
        working-directory: elm-app

      - name: Run Elm tests
        run: make elm-test

      - name: Run Haskell tests
        run: make statics-test

      - name: Build statics binary
        run: cabal build statics

      - name: Build
        run: make dist

      # ── Save statics binary for scheduled workflow ────────────────────────────

      - uses: actions/cache@v4
        with:
          path: statics/statics
          key: binary-statics-${{ runner.os }}-${{ hashFiles('statics/statics.cabal', 'cabal.project', 'statics/src/**/*.hs', 'statics/app/**/*.hs') }}

      # ── Upload artifact ───────────────────────────────────────────────────────

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/smoke-test.sh
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
